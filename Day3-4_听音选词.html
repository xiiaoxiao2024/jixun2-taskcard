* { box-sizing:border-box; }
body { margin:0; font-family:"Segoe UI Rounded",-apple-system,"PingFang SC",sans-serif; background:var(--paper); color:var(--ink); }

main { max-width:720px; margin:0 auto; padding:20px 16px 100px; }

.qsentence { font-size:1.15rem; margin:6px 0 12px; }
.qprompt { margin:4px 0 10px; color:#8a7fa0; }
.opts { display:grid; gap:8px; }

.opt:hover { background:#f3ecdd; }
.optletter { font-weight:800; color:var(--blue); flex-shrink:0; }
.qfeedback { margin:8px 0 0; font-weight:700; min-height:1.2em; }
.qcard.correct { border-color:var(--green); }
.qcard.correct .qfeedback { color:#3a8c4a; }
.qcard.wrong { border-color:var(--coral); }
.qcard.wrong .qfeedback { color:#c0432a; }
.listen-btn { background:var(--coral); color:#fff; border:none; border-radius:14px; padding:8px 18px; font-weight:700; cursor:pointer; font-size:1rem; margin-bottom:8px; }
.footer-bar { position:fixed; bottom:0; left:0; right:0; background:#fff; box-shadow:0 -4px 14px rgba(0,0,0,.1); padding:14px; display:flex; align-items:center; justify-content:center; gap:20px; }
.footer-bar button { font:inherit; cursor:pointer; font-size:1.1rem; font-weight:800; padding:10px 26px; border:none; border-radius:22px; background:var(--purple); color:#fff; }
.score { font-weight:800; font-size:1.2rem; color:#8a7fa0; }

<div class="footer-bar">
  <button id="checkBtn" type="button">Check My Answers ✓</button>
  <span class="score" id="scoreDisplay"></span>
</div>
<script>
document.querySelectorAll('.listen-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var audio = document.getElementById(btn.getAttribute('data-audio'));
    audio.currentTime = 0;
    audio.play();
  });
});
</script>
<script>
(function() {
  var checkBtn = document.getElementById('checkBtn');
  var scoreDisplay = document.getElementById('scoreDisplay');
  checkBtn.addEventListener('click', function() {
    var cards = document.querySelectorAll('.qcard');
    var correctCount = 0;
    cards.forEach(function(card) {
      var answer = card.getAttribute('data-answer');
      var qnum = card.getAttribute('data-qnum');
      var selected = card.querySelector('input[name="q' + qnum + '"]:checked');
      card.classList.remove('correct', 'wrong');
      var feedback = card.querySelector('.qfeedback');
      if (!selected) { feedback.textContent = 'Not answered yet'; return; }
      if (selected.value === answer) {
        card.classList.add('correct'); feedback.textContent = 'Correct!'; correctCount++;
      } else {
        card.classList.add('wrong'); feedback.textContent = 'Try again';
      }
    });
    scoreDisplay.textContent = 'Score: ' + correctCount + ' / ' + cards.length;
  });
})();
</script>
